name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [feature/web-api-redesign, feature/web-app-redesign]
  workflow_dispatch: {}

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build shared library
        working-directory: lib
        run: npx tsc --pretty false

      - name: Install web dependencies
        working-directory: web
        run: npm ci --include=dev

      - name: Install api dependencies
        working-directory: api
        run: npm ci --include=dev

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          # Let the action build the app and the API so functions are packaged correctly
          app_location: 'web'
          api_location: 'api'
          # Oryx builds inside `app_location` and outputs to this relative path
          output_location: 'dist'
          # Run the project's build script (dev deps already installed in earlier steps)
          app_build_command: 'npm run build'

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
